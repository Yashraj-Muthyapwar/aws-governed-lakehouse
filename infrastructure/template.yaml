AWSTemplateFormatVersion: 2010-09-09
Description: >-
  Governed Data Lakehouse infrastructure — VPC, RDS MySQL, S3 data lake,
  Lake Formation governance, Glue ETL, Athena analytics, and Iceberg table setup.
Parameters:
  ProjectPrefix:
    Type: String
    Description: Project prefix for naming resources
    Default: gov-lakehouse
  AWSRegion:
    Type: String
    Description: Default AWS Region
    Default: us-east-1
  DatabaseUserName:
    Type: String
    Description: A user name for RDS database instance.
    MinLength: 1
    MaxLength: 16
    AllowedPattern: '[a-zA-Z][a-zA-Z0-9]*'
    Default: admin
    ConstraintDescription: must begin with a letter and contain only alphanumeric characters.
  DatabaseUserPassword:
    Type: String
    Description: A user password for RDS database instance (8 characters minimum, 41 characters maximum).
    NoEcho: true
    MinLength: 8
    MaxLength: 41
    AllowedPattern: '[a-zA-Z0-9]*'
    ConstraintDescription: must contain only alphanumeric characters.
  VPCCIDR:
    Type: String
    Description: CIDR of VPC. IPv4 address range in CIDR notation.
    Default: 10.0.0.0/16

  PublicSubnetACIDR:
    Type: String
    Description: CIDR of a public subnet. IPv4 address range in CIDR notation.
    Default: 10.0.1.0/24

  PublicSubnetBCIDR:
    Type: String
    Description: CIDR of a public subnet. IPv4 address range in CIDR notation.
    Default: 10.0.2.0/24

  AssetsBucketName:
    Type: String
    Description: S3 bucket name containing deployment assets (Lambda layers, scripts, seed data).

  AssetsBucketLayerKey:
    Type: String
    Description: S3 key for Lambda layer dependencies zip.
    Default: assets/lambda_layer_dependencies.zip

  AssetsBucketLambdaKey:
    Type: String
    Description: S3 key for setup Lambda function zip.
    Default: assets/setup_lambda.py.zip

  AssetsBucketDDLObjectKey:
    Type: String
    Description: S3 key for SQL seed data file.
    Default: assets/mysqlsampledatabase.sql

  AssetsBucketJsonObjectKey:
    Type: String
    Description: S3 key for ratings JSON data.
    Default: assets/ratings/ratings.json

  AssetsBucketJsonEvolutionObjectKey:
    Type: String
    Description: S3 key for ratings JSON with timestamps (schema evolution).
    Default: assets/ratings_with_timestamp/ratings.json

  Runtime:
    Type: String
    Description: Lambda function Runtime
    Default: python3.12

  Timeout:
    Type: Number
    Description: Lambda function Timeout
    Default: 300

  MLDatalakeUserName:
    Description: IAM user name to be created to query the data lake for ML
    Type: String
    Default: ml_data_lake_user
    AllowedPattern: '[\w+=,.@-]+'
    MinLength: '1'
    MaxLength: '64'
    ConstraintDescription: The user name can have up to 64 characters. Valid
      characters include uppercase letters (A-Z), lowercase letters (a-z),
      numbers (0-9), and symbols

  MLDatalakeUserPassword:
    Description: Password for the ML IAM user to login to AWS console
    Type: String
    NoEcho: 'true'
    AllowedPattern: '[\u0009\u000A\u000D\u0020-\u00FF]+'
    MinLength: '8'
    MaxLength: '128'
    ConstraintDescription: Must be at least 8 characters long. Must include at least
      three of the following mix of character types -  uppercase letters (A-Z),
      lowercase letters (a-z), numbers (0-9), and symbols'
  LFTagKey:
    Description: LF-Tag Key to be created and assigned
    Type: String
    Default: project
  LFTagValue:
    Description: LF-Tag Value to be assigned
    Type: String
    Default: gov-lakehouse
Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: General Configuration
        Parameters:
          - ProjectPrefix
          - AWSRegion
      - Label:
          default: Network Configuration
        Parameters:
          - VPCCIDR
          - PublicSubnetACIDR
          - PublicSubnetBCIDR
Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VPCCIDR
      EnableDnsHostnames: true
      EnableDnsSupport: true
      InstanceTenancy: default
      Tags:
        - Key: Name
          Value: !Sub ${ProjectPrefix}
  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Application
          Value: !Ref AWS::StackId
        - Key: Name
          Value: !Sub ${ProjectPrefix}-igw
  InternetGatewayAttachment:
    DependsOn:
      - InternetGateway
      - VPC
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      InternetGatewayId: !Ref InternetGateway
      VpcId: !Ref VPC
  PublicSubnetA:
    DependsOn: VPC
    Type: AWS::EC2::Subnet
    Properties:
      AvailabilityZone: !Select
        - '0'
        - !GetAZs ''
      CidrBlock: !Ref PublicSubnetACIDR
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub ${ProjectPrefix}-public-subnet-a

  PublicSubnetB:
    DependsOn: VPC
    Type: AWS::EC2::Subnet
    Properties:
      AvailabilityZone: !Select
        - '1'
        - !GetAZs ''
      CidrBlock: !Ref PublicSubnetBCIDR
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub ${ProjectPrefix}-public-subnet-b
  MyDBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: Subnet available for the DB Instance
      SubnetIds:
        - !Ref PublicSubnetA
        - !Ref PublicSubnetB
    DependsOn:
      - PublicSubnetA
      - PublicSubnetB
  InternetGatewayRoute:
    DependsOn:
      - InternetGatewayAttachment
      - PublicRouteTable
    Type: AWS::EC2::Route
    Properties:
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway
      RouteTableId: !Ref PublicRouteTable

  PublicRouteTable:
    DependsOn: VPC
    Type: AWS::EC2::RouteTable
    Properties:
      Tags:
        - Key: Name
          Value: !Sub ${ProjectPrefix}-public-routetable
      VpcId: !Ref VPC

  PublicSubnetARouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnetA
      RouteTableId: !Ref PublicRouteTable

  PublicSubnetBRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnetB
      RouteTableId: !Ref PublicRouteTable

  DefaultVPCSecurityGroup:
    DependsOn: VPC
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Default Security Group for the VPC.
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub ${ProjectPrefix}-sg
  DefaultVPCSecurityGroupSelfRefIngress:
    DependsOn: DefaultVPCSecurityGroup
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      SourceSecurityGroupId: !Ref DefaultVPCSecurityGroup
      IpProtocol: '-1'
      GroupId: !Ref DefaultVPCSecurityGroup
  DBIngressRule:
    DependsOn: DefaultVPCSecurityGroup
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      FromPort: '3306'
      ToPort: '3306'
      GroupId: !Ref DefaultVPCSecurityGroup
      IpProtocol: tcp
      CidrIp: 0.0.0.0/0

  DataLakeBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub ${ProjectPrefix}-${AWS::AccountId}-${AWS::Region}-data-lake
      AccessControl: Private
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  DataSourceBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub ${ProjectPrefix}-${AWS::AccountId}-${AWS::Region}-source
      AccessControl: Private
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  LambdaLayer:
    Type: AWS::Lambda::LayerVersion
    Properties:
      CompatibleArchitectures:
        - arm64
      CompatibleRuntimes:
        - python3.12
      Content:
        S3Bucket: !Ref AssetsBucketName
        S3Key: !Ref AssetsBucketLayerKey
      Description: Lambda layer with dependencies to insert data into MySQL DB
      LayerName: gov-lakehouse-lambda-layer

  MySQLDB:
    DependsOn:
      - DefaultVPCSecurityGroup
      - MyDBSubnetGroup
      - PublicSubnetA
    Type: AWS::RDS::DBInstance
    DeletionPolicy: Delete
    Properties:
      DBInstanceIdentifier: !Sub ${ProjectPrefix}-rds
      DBName: production
      DBInstanceClass: db.t3.small
      AllocatedStorage: '20'
      AvailabilityZone: !GetAtt PublicSubnetA.AvailabilityZone
      DBSubnetGroupName: !Ref MyDBSubnetGroup
      Engine: MySQL
      EngineVersion: 8.0.45
      MasterUsername: !Ref DatabaseUserName
      MasterUserPassword: !Ref DatabaseUserPassword
      MultiAZ: false
      PubliclyAccessible: true
      VPCSecurityGroups:
        - !Ref DefaultVPCSecurityGroup

  Function:
    DependsOn:
      - LambdaLayer
      - MySQLDB
    Type: AWS::Lambda::Function
    Properties:
      Environment:
        Variables:
          DBHOST: !GetAtt MySQLDB.Endpoint.Address
          DBPORT: !GetAtt MySQLDB.Endpoint.Port
          DBPASSWORD: !Ref DatabaseUserPassword
          DBUSER: !Ref DatabaseUserName
          BUCKET_NAME: !Ref AssetsBucketName
          OBJECT_KEY: !Ref AssetsBucketDDLObjectKey
      Code:
        ZipFile: |
          import json
          import logging
          import os

          import boto3
          import sqlalchemy as sa
          import sqlparse

          DBHOST = os.getenv("DBHOST", "")
          DBPORT = int(os.getenv("DBPORT", ""))
          DBNAME = os.getenv("DBDATABASE", "")
          DBUSER = os.getenv("DBUSER", "")
          DBPASSWORD = os.getenv("DBPASSWORD", "")
          BUCKET_NAME = os.getenv("BUCKET_NAME", "")
          OBJECT_KEY = os.getenv("OBJECT_KEY", "")
          CREATE = 'Create'
          DELETE = 'Delete'
          response_data = {}

          logger = logging.getLogger()
          logger.setLevel(logging.INFO)

          def lambda_handler(event, context):
              logger.info(f"Event: {event}")
              try:
                  logger.info(f"SQLAlchemy version {sa.__version__}")

                  # Reading file from S3
                  s3 = boto3.client("s3")

                  response = s3.get_object(Bucket=BUCKET_NAME, Key=OBJECT_KEY)
                  logger.info(f"response:  {response}")
                  sql_statement = response["Body"].read().decode("utf-8")
                  sql_list = sqlparse.split(sql_statement)

                  # Population of Database
                  engine = sa.create_engine(
                      f"mysql+pymysql://{DBUSER}:{DBPASSWORD}@{DBHOST}/{DBNAME}?charset=utf8mb4"
                  )

                  with engine.connect() as conn:
                      for statement in sql_list:
                          db_response = conn.execute(sa.text(statement))

                      conn.commit()
              except Exception as exc:
                  logger.error(f"Error: {str(exc)}")
      FunctionName: !Sub ${ProjectPrefix}-lambda-function
      Handler: index.lambda_handler
      Layers:
        - !Ref LambdaLayer
      Runtime: !Ref Runtime
      Role: !GetAtt FunctionRole.Arn
      Timeout: !Ref Timeout

  FunctionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Action: sts:AssumeRole
            Principal:
              Service:
                - lambda.amazonaws.com
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaVPCAccessExecutionRole
        - arn:aws:iam::aws:policy/AmazonS3ReadOnlyAccess

  # Create Lake Formation Role to register data lake location
  LFDatalakeRegisterRole:
    DependsOn:
      - DataLakeBucket
      - LambdaRoleSetup
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${ProjectPrefix}-LF-Register-Role
      Description: Permissions to use LF Register feature
      Path: /
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lakeformation.amazonaws.com
            Action:
              - sts:AssumeRole
          - Effect: Allow
            Principal:
              AWS: !GetAtt LambdaRoleSetup.Arn
            Action:
              - sts:AssumeRole
      Policies:
        - PolicyName: LFRegisterPermissions
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - lakeformation:*
                Resource: '*'
              - Effect: Allow
                Action:
                  - glue:GetDatabase
                  - glue:GetDatabases
                  - glue:GetTable
                  - glue:GetTables
                Resource:
                  - !Sub arn:${AWS::Partition}:glue:${AWS::Region}:${AWS::AccountId}:database/*
                  - !Sub arn:${AWS::Partition}:glue:${AWS::Region}:${AWS::AccountId}:table/*
                  - !Sub arn:${AWS::Partition}:glue:${AWS::Region}:${AWS::AccountId}:catalog
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                  - s3:ListBucket
                Resource:
                  - !Sub arn:${AWS::Partition}:s3:::${DataLakeBucket}
                  - !Sub arn:${AWS::Partition}:s3:::${DataLakeBucket}/*

  #Policy to iam:PassRole itself to be attached to LFDatalakeRegisterRole
  LFRegisterPassRolePolicy:
    DependsOn:
      - LFDatalakeRegisterRole
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: LFRegisterSelfPassRole
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - iam:PassRole
            Resource:
              - !GetAtt LFDatalakeRegisterRole.Arn
      Roles:
        - !Ref LFDatalakeRegisterRole

  # Create DatalakeAdminRole
  DatalakeAdminRole:
    Type: AWS::IAM::Role
    DependsOn:
      - LambdaRoleSetup
      - GlueETLRole
    Properties:
      RoleName: !Sub ${ProjectPrefix}-DatalakeAdmin-Role
      Description: Datalake Admin Role
      Path: /
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lakeformation.amazonaws.com
            Action:
              - sts:AssumeRole
          - Effect: Allow
            Principal:
              AWS: !GetAtt LambdaRoleSetup.Arn
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AWSLakeFormationDataAdmin
        - arn:aws:iam::aws:policy/AWSGlueConsoleFullAccess
        - arn:aws:iam::aws:policy/CloudWatchLogsReadOnlyAccess
        - arn:aws:iam::aws:policy/AWSLakeFormationCrossAccountManager
        - arn:aws:iam::aws:policy/AmazonAthenaFullAccess
        - arn:aws:iam::aws:policy/AWSCloudFormationReadOnlyAccess
      Policies:
        - PolicyName: LakeFormationSetup
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - iam:GetRole
                Resource: '*'
        - PolicyName: LakeFormationSLR
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - iam:CreateServiceLinkedRole
                Resource: '*'
                Condition:
                  StringEquals:
                    iam:AWSServiceName: lakeformation.amazonaws.com
              - Effect: Allow
                Action:
                  - iam:PutRolePolicy
                Resource:
                  - !Sub arn:aws:iam::${AWS::AccountId}:role/aws-service-role/lakeformation.amazonaws.com/AWSServiceRoleForLakeFormationDataAccess

  # Register datalake location using the custom LF Service role
  LFRegisterDataLakeLocation:
    DependsOn:
      - LFDatalakeRegisterRole
      - DataLakeBucket
    Type: AWS::LakeFormation::Resource
    Properties:
      ResourceArn: !GetAtt DataLakeBucket.Arn
      RoleArn: !GetAtt LFDatalakeRegisterRole.Arn
      UseServiceLinkedRole: false

  # Add DatalakeAdmin as a Data Lake Admin
  LFDataLakeSettings:
    DependsOn:
      - DatalakeAdminRole
      - GlueETLRole
    Type: AWS::LakeFormation::DataLakeSettings
    Properties:
      Admins:
        - DataLakePrincipalIdentifier: !GetAtt DatalakeAdminRole.Arn
        - DataLakePrincipalIdentifier: !GetAtt GlueETLRole.Arn

  # Create Glue Role for ETL
  GlueETLRole:
    DependsOn:
      - DataLakeBucket
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${ProjectPrefix}-glue-role
      Description: Permissions to run Glue ETL
      Path: /
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - glue.amazonaws.com
            Action: sts:AssumeRole
          - Effect: Allow
            Principal:
              Service:
                - lakeformation.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSGlueServiceRole
      Policies:
        - PolicyName: LFGetDataAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - lakeformation:GetDataAccess
                  - lakeformation:GrantPermissions
                Resource: '*'
              - Effect: Allow
                Action:
                  - glue:GetDatabase
                  - glue:GetDatabases
                  - glue:GetTable
                  - glue:GetTables
                Resource:
                  - !Sub arn:${AWS::Partition}:glue:${AWS::Region}:${AWS::AccountId}:database/*
                  - !Sub arn:${AWS::Partition}:glue:${AWS::Region}:${AWS::AccountId}:table/*
                  - !Sub arn:${AWS::Partition}:glue:${AWS::Region}:${AWS::AccountId}:catalog
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                  - s3:ListBucket
                Resource:
                  - !Sub arn:${AWS::Partition}:s3:::${DataLakeBucket}
                  - !Sub arn:${AWS::Partition}:s3:::${DataLakeBucket}/*
                  - !Sub arn:${AWS::Partition}:s3:::${ProjectPrefix}*
                  - !Sub arn:${AWS::Partition}:s3:::${ProjectPrefix}*/*

  #Policy to iam:PassRole itself to be attached to GlueETLRole
  LFGlueRegisterPassRolePolicy:
    DependsOn:
      - GlueETLRole
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: LFRegisterSelfPassRole
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - iam:PassRole
            Resource:
              - !GetAtt GlueETLRole.Arn
      Roles:
        - !Ref GlueETLRole

  S3BucketAthenaWorkgroup:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub ${ProjectPrefix}-${AWS::AccountId}-${AWS::Region}-athena-wg
      AccessControl: Private
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  ScriptS3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub ${ProjectPrefix}-${AWS::AccountId}-${AWS::Region}-scripts
      AccessControl: Private
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  AthenaWorkGroup:
    DependsOn: S3BucketAthenaWorkgroup
    Type: AWS::Athena::WorkGroup
    Properties:
      Description: Athena workgroup
      Name: !Sub ${ProjectPrefix}-workgroup
      RecursiveDeleteOption: true
      State: ENABLED
      WorkGroupConfiguration:
        EnforceWorkGroupConfiguration: true
        EngineVersion:
          SelectedEngineVersion: Athena engine version 3
        PublishCloudWatchMetricsEnabled: false
        RequesterPaysEnabled: false
        ResultConfiguration:
          OutputLocation: !Join
            - ''
            - - s3://
              - !Ref S3BucketAthenaWorkgroup
              - /
          EncryptionConfiguration:
            EncryptionOption: SSE_S3

  # Create ML consumer IAM user with Lake Formation scoped permissions
  MLDatalakeUser:
    Type: AWS::IAM::User
    Properties:
      UserName: !Ref MLDatalakeUserName
      LoginProfile:
        Password: !Ref MLDatalakeUserPassword
      Policies:
        - PolicyName: DatalakeUserBasic
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - athena:ListWorkGroups
                  - lakeformation:GetDataAccess
                Resource: '*'
              - Effect: Allow
                Action:
                  - glue:GetDatabase
                  - glue:GetDatabases
                  - glue:GetTable
                  - glue:GetTables
                  - glue:DeleteTable
                  - glue:CreateTable
                Resource:
                  - !Sub arn:${AWS::Partition}:glue:${AWS::Region}:${AWS::AccountId}:database/*
                  - !Sub arn:${AWS::Partition}:glue:${AWS::Region}:${AWS::AccountId}:table/*
                  - !Sub arn:${AWS::Partition}:glue:${AWS::Region}:${AWS::AccountId}:catalog
              - Effect: Allow
                Action:
                  - athena:GetDataCatalog
                  - athena:GetQueryExecution
                  - athena:GetQueryResults
                  - athena:GetWorkGroup
                  - athena:StartQueryExecution
                  - athena:StopQueryExecution
                Resource:
                  - !Sub arn:${AWS::Partition}:athena:${AWS::Region}:${AWS::AccountId}:workgroup/*
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                  - s3:ListBucket
                  - s3:ListBucketMultipartUploads
                  - s3:AbortMultipartUpload
                  - s3:CreateBucket
                  - s3:GetBucketLocation
                Resource:
                  - !Sub arn:${AWS::Partition}:s3:::${S3BucketAthenaWorkgroup}
                  - !Sub arn:${AWS::Partition}:s3:::${S3BucketAthenaWorkgroup}/*

  MLDatalakeCredentials:
    Type: AWS::IAM::AccessKey
    DependsOn: MLDatalakeUser
    Properties:
      Status: Active
      UserName: !Ref MLDatalakeUserName

  MLDatalakeCredentialsStored:
    Type: AWS::SecretsManager::Secret
    DependsOn: MLDatalakeCredentials
    Properties:
      Name: !Sub /datalake/credentials/${MLDatalakeUserName}
      SecretString: !Sub '{"ACCESS_KEY":"${MLDatalakeCredentials}","SECRET_KEY":"${MLDatalakeCredentials.SecretAccessKey}"}'

  EndpointS3:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcEndpointType: Gateway
      RouteTableIds:
        - !Ref PublicRouteTable
      ServiceName: !Sub com.amazonaws.${AWS::Region}.s3
      VpcId: !Ref VPC

  # Lambda execution role for Iceberg table setup
  LambdaRoleSetup:
    DependsOn: Function
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${ProjectPrefix}-Setup-Lambda-Role
      Description: Permissions to use LF Register feature and basic setup
      Path: /
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
        - arn:aws:iam::aws:policy/AmazonS3FullAccess
        - arn:aws:iam::aws:policy/service-role/AWSLambdaVPCAccessExecutionRole
      Policies:
        - PolicyName: LambdaS3PutPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: s3:Put*
                Resource: !Sub arn:aws:s3:::${DataSourceBucket}/*
        - PolicyName: LambdaInvoke
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: lambda:InvokeFunction
                Resource: !GetAtt Function.Arn

  # Create Lambda function
  LambdaFunctionSetup:
    DependsOn:
      - DataLakeBucket
      - LambdaLayer
      - DatalakeAdminRole
      - GlueETLRole
      - LFDatalakeRegisterRole
      - LambdaRoleSetup
    Type: AWS::Lambda::Function
    Properties:
      Description: Lambda function to create Iceberg table and grant access
      FunctionName: !Sub ${ProjectPrefix}-Lambda-Setup
      Handler: setup_lambda.handler
      MemorySize: 128
      Role: !GetAtt LambdaRoleSetup.Arn
      Runtime: !Ref Runtime
      Timeout: !Ref Timeout
      Layers:
        - !Ref LambdaLayer
      Environment:
        Variables:
          Lambda_Name: !Sub ${ProjectPrefix}-lambda-function
          S3Bucket_Name: !Ref DataLakeBucket
          Datalake_Admin_RoleArn: !GetAtt DatalakeAdminRole.Arn
          Datalake_Register_RoleArn: !GetAtt LFDatalakeRegisterRole.Arn
          Glue_ETLJob_RoleArn: !GetAtt GlueETLRole.Arn
          LFTag_Key: !Ref LFTagKey
          LFTag_Value: !Ref LFTagValue
          SOURCE_BUCKET_NAME: !Ref AssetsBucketName
          SOURCE_PATH_JSON: !Ref AssetsBucketJsonObjectKey
          SOURCE_PATH_JSON_EVO: !Ref AssetsBucketJsonEvolutionObjectKey
          DESTINATION_BUCKET: !Ref DataSourceBucket
      Code:
        S3Bucket: !Ref AssetsBucketName
        S3Key: !Ref AssetsBucketLambdaKey

  SetupLambdaExecution:
    DependsOn:
      - LambdaFunctionSetup
      - LFDataLakeSettings
      - MySQLDB
    Type: Custom::CFSetupLambdaExecution
    Properties:
      ServiceToken: !GetAtt LambdaFunctionSetup.Arn
    DeletionPolicy: Delete
Outputs:
  AWSRegion:
    Description: AWS Region where resources are deployed
    Value: !Sub ${AWS::Region}
  AWSAccount:
    Description: AWS Account ID where resources are deployed
    Value: !Sub ${AWS::AccountId}
  VPCID:
    Description: VPC ID for the lakehouse network
    Value: !Ref VPC
  PublicSubnetAID:
    Description: Public Subnet A ID
    Value: !Ref PublicSubnetA
  PublicSubnetBID:
    Description: Public Subnet B ID
    Value: !Ref PublicSubnetB
  DataLakeBucket:
    Description: This is the S3 bucket for the data lake
    Value: !Ref DataLakeBucket
  DataSourceBucket:
    Description: This is the S3 bucket for the data lake
    Value: !Ref DataSourceBucket
  MySQLJDBCConnectionString:
    Description: JDBC connection string for MySQL database
    Value: !Join
      - ''
      - - jdbc:mysql://
        - !GetAtt MySQLDB.Endpoint.Address
        - ':'
        - !GetAtt MySQLDB.Endpoint.Port
        - /classicmodels
  MySQLEndpoint:
    Description: RDS endpoint for MySQL DB instance
    Value: !GetAtt MySQLDB.Endpoint.Address
  GlueETLRole:
    Value: !GetAtt GlueETLRole.Arn
    Description: GlueETL Role Arn
  DatalakeAdminRole:
    Value: !GetAtt DatalakeAdminRole.Arn
    Description: DatalakeAdmin Role Arn
  MLDatalakeUserName:
    Value: !Ref MLDatalakeUserName
    Description: ML consumer IAM user name